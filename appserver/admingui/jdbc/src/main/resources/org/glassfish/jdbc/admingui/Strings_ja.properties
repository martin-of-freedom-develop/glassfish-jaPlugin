jdbcResources.pageTitle=JDBCリソース
jdbcResources.pageTitleHelp=JDBCリソースは、アプリケーションがデータベースに接続する手段を提供します。
jdbcResource.editPageTitle=JDBCリソースの編集
jdbcResource.editPageTitleHelp=既存のJDBCデータソースを編集します。
jdbcResource.targetPageTitle=JDBCリソースのターゲット
jdbcResource.newPageTitle=新規JDBCリソース
jdbcResource.newPageTitleHelp=作成するJDBCリソースを識別する一意のJNDI名を指定します。名前には英数字、アンダースコア、ハイフン、ドットのみ使用できます。
jdbcResource.poolHelp=新しいプールを作成するには<a href="#{request.contextPath}/jdbc/jdbcConnectionPools.jsf">JDBC接続プール</a> ページを使用します

# JDBC Connection Pool
jdbcConnectionPools.pageTitle=JDBC接続プール
jdbcConnectionPools.pageTitleHelp=多くのアプリケーションは、データの保存・整理・取得にリレーショナル・データベースを使用します。Jakarta EEアプリケーションはJDBC APIを通じてリレーショナル・データベースへアクセスします。アプリケーションがデータベースにアクセスする前に、接続を取得する必要があります。

jdbcConnectionPool.step1PageTitle=新規JDBC接続プール（ステップ 1/2）
jdbcConnection.step1PageHelp=接続プールの一般設定を指定します。
jdbcConnectionPool.Step2PageTitle=新規JDBC接続プール（ステップ 2/2）
jdbcConnection.step2PageHelp=接続プールの一般設定を指定します。接続プールにはDatasource ClassnameまたはDriver Classnameのいずれかを指定する必要があります。

jdbcConnectionPool.editPageTitle=JDBC接続プールの編集
jdbcConnection.editPageHelp=既存のJDBC接続プールを変更します。JDBC接続プールは、特定のデータベース向けの再利用可能な接続の集合です。
jdbcPool.general=一般設定
jdbcPool.poolName=プール名：
jdbcPool.datasource=Datasourceクラス名：
jdbcPool.driver=Driverクラス名：

## do not translate DataSource and XADataSource
jdbcPool.datasourceHelpEnter=DataSourceおよび/またはXADataSource APIを実装するベンダ固有のクラス名を選択または入力します
## do not translate java.sql.Driver
jdbcPool.driverHelpEnter=java.sql.Driverインタフェースを実装するベンダ固有のクラス名を選択または入力します。
## do not translate DataSource and XADataSource
jdbcPool.datasourceHelp=DataSourceおよび/またはXADataSource APIを実装するベンダ固有のクラス名

## do not translate java.sql.Driver
jdbcPool.driverHelp=java.sql.Driverインタフェースを実装するベンダ固有のクラス名。

jdbcPool.resTypeHelp=データソース・クラスが複数のインタフェースを実装している場合は指定が必須です。
jdbcPool.dbVendor=データベース・ドライバ・ベンダ：
jdbcPool.dbVendorHelp=データベース・ドライバのベンダを選択または入力します
jdbcPool.introspect=イントロスペクト：
jdbcPool.introspectHelp=有効にすると、データソースまたはドライバ実装のクラス名に対してイントロスペクションを行います。
jdbcPool.poolSettings=プール設定
jdbcPool.initPoolSize=初期/最小プール・サイズ：
jdbcPool.initPoolSizeHelp=プールで維持される接続の最小かつ初期数
jdbcPool.maxPoolSize=最大プール・サイズ：
jdbcPool.maxPoolSizeHelp=クライアント要求を満たすために作成できる最大接続数
jdbcPool.poolResize=プールのリサイズ数：
jdbcPool.poolResizeHelp=プールのアイドル・タイムアウト期限切れ時に削除される接続数
jdbcPool.idleTimeout=アイドル・タイムアウト：
jdbcPool.idleTimeoutHelp=接続がプール内でアイドル状態のままにできる最大時間
jdbcPool.maxWait=最大待機時間：
jdbcPool.maxWaitHelp=接続のタイムアウトが送出されるまで呼び出し元が待機する時間
jdbcPool.Validation=接続検証
jdbcPool.conValidation=接続検証：
jdbcPool.conValidationHelp=接続を検証し、障害時にサーバが再接続できるようにします
jdbcPool.valMethod=検証方法：
jdbcPool.valCN=検証クラス名：
jdbcPool.valCNHelp=custom-validationを選択した場合、検証クラス名を指定します。
jdbcPool.tableName=テーブル名：
jdbcPool.tableNameHelp=テーブル検証を選択した場合、テーブル名を選択または入力します。
jdbcPool.populatetableNames=テーブル名を取得
jdbcPool.failOnAny=障害発生時の動作：
jdbcPool.failOnAnyHelp=障害時にすべての接続を閉じて再接続します。無効の場合は使用時のみ再接続します
jdbcPool.closeAll=すべての接続を閉じる
jdbcPool.allowCaller=非コンポーネント呼び出しの許可：
jdbcPool.allowCallerHelp=Servletフィルタなどの非コンポーネント呼び出し元によるプールの使用を有効にします
jdbcPool.nonTransConnection=非トランザクション接続：
jdbcPool.nonTransConnectionHelp=非トランザクション接続を返します

jdbcPool.transIsolationSection=トランザクション
jdbcPool.transIsolation=トランザクション分離レベル：
jdbcPool.transIsolationHelp=未指定の場合、JDBCドライバのデフォルト・レベルを使用します

# the following is a checkbox labeled Isolation Label, followed by the word Guaranteed
#   Isolation Level: []  Guaranteed

jdbcPool.isoLevel=分離レベル：
jdbcPool.Guaranteed=保証
jdbcPool.isoLevelHelp=すべての接続で同一の分離レベルを使用します（トランザクション分離レベルの指定が必要）

jdbcPool.initSqlHelp=プールから接続が作成されるたびに実行するSQL文字列を指定します
jdbcPool.initSql=初期化SQL：
jdbcPool.sqlTL=SQLトレース・リスナ：
jdbcPool.sqlTLHelp=org.glassfish.api.jdbc.SQLTraceListenerインタフェースを実装するクラスのカンマ区切りリスト
jdbcPool.pooling=プーリング：
jdbcPool.poolingHelp=falseの場合、当該プールの接続プーリングを無効にします
jdbcPool.duringCreation=作成時
jdbcPool.ping=Ping：
jdbcPool.pingHelp=有効にすると、作成または再構成の際にプールへpingを実行し、属性の不正値を検出・警告します
jdbcConnectionPool.advancePageTitle=JDBC接続プールの詳細属性を編集
jdbcConnectionPool.advancePageTitleHelp=既存のJDBC接続プールを変更します。JDBC接続プールは、特定のデータベース向けの再利用可能な接続の集合です。
jdbcPool.connectionSettings=接続設定
jdbcPool.wrapJdbcObjects=JDBCオブジェクトのラップ：

## do not translate the StudlyCaps word: Statement, PreparedStatement, CallableStatement, ResultSet, DatabaseMetaData
jdbcPool.wrapJdbcObjectsHelp=trueの場合、アプリケーションはStatement、PreparedStatement、CallableStatement、ResultSet、DatabaseMetaDataのラップされたJDBCオブジェクトを受け取ります

jdbcPool.statementCacheSize=ステートメント・キャッシュ・サイズ：
jdbcPool.statementCacheSizeHelp=正の非ゼロ値（例：10）を設定するとキャッシュが有効になります
jdbcPool.statementTimeoutInSeconds=ステートメントのタイムアウト：
jdbcPool.statementTimeoutInSecondsHelp=異常に長時間実行されるクエリを終了させるための接続プロパティ。-1は無効を示します。
jdbcPool.validateAtmostOnceInSeconds=最大検証間隔：
jdbcPool.validateAtmostOnceInSecondsHelp=同一接続の連続する検証要求の間隔（秒）を指定します。デフォルトは0（無効）です。
jdbcPool.connectionLeakTimeoutInSeconds=接続リーク・タイムアウト：
jdbcPool.connectionLeakTimeoutInSecondsHelp=0は接続リーク検出なしを示します
jdbcPool.connectionLeakReclaim=接続リークの回収：
jdbcPool.connectionLeakReclaimHelp=有効にすると、接続リーク・タイムアウト発生後にプールがリークした接続を回収します
jdbcPool.statementLeakTimeoutInSeconds=ステートメント・リーク・タイムアウト：
jdbcPool.statementLeakTimeoutInSecondsHelp=0はステートメント・リーク検出なしを示します
jdbcPool.statementLeakReclaim=ステートメント・リークの回収：
jdbcPool.statementLeakReclaimHelp=有効にすると、ステートメント・リーク・タイムアウト発生後にプールがリークしたステートメントを回収します
jdbcPool.connectionCreationRetryAttempts=作成リトライ回数：
jdbcPool.connectionCreationRetryAttemptsHelp=新しい接続の作成を試みる回数。0はリトライなしを示します。
jdbcPool.connectionCreationRetryIntervalInSeconds=リトライ間隔：
jdbcPool.connectionCreationRetryIntervalInSecondsHelp=接続作成の試行時におけるリトライ間隔。作成リトライ回数が0より大きい場合に有効です。
jdbcPool.lazyConnectionEnlistment=遅延エンリスト：
jdbcPool.lazyConnectionEnlistmentHelp=実際にメソッドで使用されたときにのみ、リソースをトランザクションへエンリストします
jdbcPool.lazyConnectionAssociation=遅延関連付け：
jdbcPool.lazyConnectionAssociationHelp=操作が実行されたときに接続を遅延的に関連付けます
jdbcPool.associationWithThread=スレッドとの関連付け：
jdbcPool.associationWithThreadHelp=同一スレッドが接続を必要とする場合、そのスレッドに既に関連付けられた接続を再利用できます
jdbcPool.matchConnections=接続のマッチング：
jdbcPool.matchConnectionsHelp=プールの接続マッチングを有効/無効にします
jdbcPool.maxConnectionUsageCount=最大接続使用回数：
jdbcPool.maxConnectionUsageCountHelp=接続は指定回数だけプールで再利用され、その後クローズされます。0はこの機能の無効化を示します。
jdbcConnectionPool.propertyPageTitle=JDBC接続プールのプロパティを編集
jdbcConnectionPool.propertyPageTitleHelp=既存のJDBC接続プールのプロパティを変更します。

