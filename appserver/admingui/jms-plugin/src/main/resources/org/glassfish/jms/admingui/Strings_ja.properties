availability.jmsAvailabilityInfoHelp=<p><b>注意:</b> 既存クラスタをこのページで再構成する前に、<i>High Availability Administration Guide</i>の<a href="http://www.oracle.com/pls/topic/lookup?ctx=E26576_01&id=GSHAG00158">こちら</a> に記載の、別タイプのブローカ・クラスタへ移行するための特別な手順に従ってください。これらの手順を実施しないと、実行したJMS操作の内容によっては、データ損失や破損、さらには環境が使用不能になる恐れがあります。
availability.configStoreType=構成ストア種別：
availability.configStoreTypeHelp=従来型クラスタにおける構成データ用データストアの種別。値masterbrokerは、構成データの保存と管理にマスター・ブローカを使用することを示します。値shareddbは、構成データの保存に共有データベースを使用することを示します。availability enabledがtrueの場合、このオプションは無視されます。
availability.messageStoreType=メッセージ・ストア種別：
availability.messageStoreTypeHelp=従来型クラスタのブローカにおけるメッセージ・データ用データストアの種別。値fileはファイル・ストア、値jdbcはJDBCストアを示します。availability enabledがtrueの場合、このオプションは無視されます。
availability.dbVendor=データベンダ：
availability.dbVendorHelp=可用性サービス有効時、または構成ストア種別が'shareddb'、またはメッセージ・ストア種別が'jdbc'の場合に使用するJDBCデータベースのベンダ。
availability.dbUserName=データベース・ユーザー名：
availability.dbUserNameHelp=可用性サービス有効時、または構成ストア種別が'shareddb'、またはメッセージ・ストア種別が'jdbc'の場合に使用するJDBCデータベースのユーザー名。
availability.dbPassword=データベース・パスワード：
availability.dbPasswordHelp=可用性サービス有効時、または構成ストア種別が'shareddb'、またはメッセージ・ストア種別が'jdbc'の場合に使用するJDBCデータベースのパスワード。
availability.dbUrl=データベース・アクセスURL：
availability.dbUrlHelp=可用性サービス有効時、または構成ストア種別が'shareddb'、またはメッセージ・ストア種別が'jdbc'の場合に使用するJDBCデータベースのアクセスURL。
availability.instancesRunning=これらの設定を変更する場合、この構成を使用しているすべてのインスタンスを停止する必要があります！
