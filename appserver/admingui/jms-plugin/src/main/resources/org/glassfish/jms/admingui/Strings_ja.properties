## Config attributes
jmsPhysDestinations.MaxNumMsgs=未消費メッセージの最大数：
jmsPhysDestinations.MaxNumMsgsHelp=値-1はメッセージ数に上限がないことを示します

jmsPhysDestinations.MaxBytesPerMsg=メッセージの最大サイズ：
jmsPhysDestinations.MaxBytesPerMsgHelp=単一メッセージの最大サイズ（バイト）。値-1はメッセージ・サイズに上限がないことを示します。

jmsPhysDestinations.MaxTotalMsgBytes=メモリの合計上限：
jmsPhysDestinations.MaxTotalMsgBytesHelp=未消費メッセージに使用できるメモリの合計（バイト）

jmsPhysDestinations.LimitBehavior=しきい値到達時の動作：
jmsPhysDestinations.LimitBehaviorHelp=メモリ上限制限に達したときのブローカの動作。「最古を破棄」または「低優先度メッセージを破棄」を選択し、かつデッドメッセージキューの使用がtrueの場合、超過メッセージはデッドメッセージキューへ移動されます。

jmsPhysDestinations.MaxNumProducers=プロデューサの最大数：
jmsPhysDestinations.MaxNumProducersHelp=関連付けられるメッセージ・プロデューサの最大数。この上限に達すると、新しいプロデューサは作成できません。値-1は上限なしを示します。

jmsPhysDestinations.MaxNumActiveConsumers=最大アクティブ・コンシューマ数：
jmsPhysDestinations.MaxNumActiveConsumersHelp=[キュー宛先のみ]負荷分散配信における関連付けられたアクティブ・メッセージ・コンシューマの最大数。値-1は上限なしを示します。

jmsPhysDestinations.MaxNumBackupConsumers=バックアップ・コンシューマの最大数：
jmsPhysDestinations.MaxNumBackupConsumersHelp=負荷分散配信における関連付けられたバックアップ・メッセージ・コンシューマの最大数。値-1は上限なしを示します。

jmsPhysDestinations.ConsumerFlowLimit=一括配信の最大メッセージ数：
jmsPhysDestinations.ConsumerFlowLimitHelp=単一のバッチでコンシューマに配信される最大メッセージ数。値-1は上限なしを示します。

jmsPhysDestinations.LocalDeliveryPreferred=ローカル配信を優先
jmsPhysDestinations.LocalDeliveryPreferredHelp=このプロパティはブローカ・クラスタの負荷分散配信にのみ適用されます。trueの場合、ローカル・ブローカに関連付けられたコンシューマがいないときにのみメッセージをリモート・コンシューマに配信します。宛先はローカル限定配信に制限されていてはなりません（LocalOnlyはfalse）。

jmsPhysDestinations.UseDMQ=デッドメッセージキューを使用：
jmsPhysDestinations.UseDMQHelp=デッドメッセージをデッドメッセージキューへ送りますか？falseの場合、デッドメッセージは単に破棄されます。

jmsPhysDestinations.ValidateXMLSchemaEnabled=XMLスキーマの検証：
jmsPhysDestinations.ValidateXMLSchemaEnabledHelp=falseまたは未設定の場合、この宛先ではXMLスキーマ検証は有効になりません。

jmsPhysDestinations.XMLSchemaURIList=XMLスキーマURIリスト：
jmsPhysDestinations.XMLSchemaURIListHelp=スペース区切りのXMLスキーマ文書（XSD）のURI文字列リスト。有効化されている場合、XMLスキーマ検証に使用するXSDの場所を指します。

