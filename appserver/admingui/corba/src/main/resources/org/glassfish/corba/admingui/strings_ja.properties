## ORB
headings.Orb=ORB
orb.OrbInfo=オブジェクト要求ブローカ（ORB）はCORBAの中核コンポーネントです。ORBは、オブジェクトの識別と所在の特定、接続管理、データ配送、要求の通信に必要な基盤を提供します。エンタープライズBean（EJBモジュール）のリモートクライアントは、ORBを利用してGlassFishサーバと通信します。
orb.maxMsgSizeLabel=最大メッセージフラグメントサイズ：
orb.maxMsgSizeHelp=IIOP1.2のメッセージボディサイズ
orb.totalConnsLabel=総接続数：
orb.totalConnsHelp=すべてのIIOPリスナに対する受信接続の最大数
orb.iiopClientLabel=IIOPクライアント認証：
orb.threadPoolIdLabel=スレッドプールID：
orb.threadPoolIdHelp=ワークキューのID

iiopListeners.TableTitle=リスナ
iiopListeners.ListPageTitle=IIOPリスナ
iiopListeners.ListPageHelp=1つのORBに対して複数のIIOPリスナを構成でき、各リスナは異なるネットワークアドレスとポートの組合せで接続を受け付けます。セキュア通信やクライアント認証の有無など、リスナごとに異なる設定が可能です。新しいリスナを定義するには［新規］をクリックします。既存のリスナの設定を変更するには、その名前をクリックします。

iiopListener.newPageTitle=新規IIOPリスナ
iiopListener.newPageHelp=IIOPリスナは、EJBコンポーネントのリモートクライアントやその他のCORBAベースのクライアントからの受信接続を受け付けるリスナソケットです。
iiopListener.editPageTitle=IIOPリスナの編集
iiopListener.editPageTitleHelp=IIOPリスナは、EJBコンポーネントのリモートクライアントやその他のCORBAベースのクライアントからの受信接続を受け付けるリスナソケットです。
iiopListener.netwkAddrLabel=ネットワークアドレス：
iiopListener.netwkAddrHelp=リスナをバインドするネットワークアドレス。IPアドレスまたはDNSで解決可能なホスト名を指定できます。名前には英数字、アンダースコア、ハイフン、ドットのみ使用できます。
iiopListener.listPortLabel=リスナポート：
iiopListener.listPortHelp=IIOP接続用のORBリスナポートです。
iiopListener.listenerLabel=リスナ：
iiopListener.listenerHelp=アプリケーションサーバへのORBのIIOP受信接続を有効にします。
